<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menon AI Control</title>
  <meta name="description" content="Menon AI Control — Product & Offers Dashboard" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231B3A6B'/%3E%3Ctext x='32' y='50' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='48' fill='white'%3EM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Mobile hamburger -->
  <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6" />
      <line x1="3" y1="12" x2="21" y2="12" />
      <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
  </button>

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <img
          src="https://whmbrguzumyatnslzfsq.supabase.co/storage/v1/object/public/tshirts/hjEnJh07dLwIuTOKNQxNmUjFoBGzFrMNCXlKdlIF.png"
          alt="Menon AI" />
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="products" id="nav-products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
          <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
          <line x1="12" y1="22.08" x2="12" y2="12" />
        </svg>
        <span>Products</span>
      </button>
      <button class="nav-btn" data-view="offers" id="nav-offers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
          <line x1="7" y1="7" x2="7.01" y2="7" />
        </svg>
        <span>Offers</span>
      </button>

      <!-- Whatsapp API Button -->
      <a href="https://whatsappmenon-production.up.railway.app/" target="_blank" rel="noopener noreferrer" class="nav-btn nav-btn-whatsapp" id="nav-whatsapp-api">
        <svg viewBox="0 0 24 24" fill="none" class="whatsapp-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
        <span>WhatsApp API</span>
      </a>

      <!-- Whatsapp Campaigns Button -->
      <a href="https://campaignsfinal-production.up.railway.app/" target="_blank" rel="noopener noreferrer" class="nav-btn nav-btn-whatsapp" id="nav-whatsapp-campaigns">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
          <line x1="8" y1="11" x2="16" y2="11" stroke-width="1.5"/>
          <line x1="8" y1="14" x2="13" y2="14" stroke-width="1.5"/>
        </svg>
        <span>WhatsApp Campaigns</span>
      </a>

      <!-- AI Status Toggles -->
      <div class="sidebar-status-toggles">
        <div class="status-toggle-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="messenger-icon">
            <path d="M12 2C6.48 2 2 6.14 2 11.25C2 14.13 3.5 16.69 5.86 18.28V22L9.36 20.08C10.2 20.34 11.08 20.5 12 20.5C17.52 20.5 22 16.36 22 11.25C22 6.14 17.52 2 12 2ZM13.06 14.88L11 12.63L7.06 14.88L10.94 10.75L13 13L16.94 10.75L13.06 14.88Z" fill="currentColor" stroke="none"/>
          </svg>
          <span class="toggle-label">Messenger</span>
          <label class="switch">
            <input type="checkbox" id="toggle-messenger" disabled>
            <span class="slider round"></span>
          </label>
        </div>
        <div class="status-toggle-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="whatsapp-icon">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor"></path>
          </svg>
          <span class="toggle-label">WhatsApp</span>
          <label class="switch">
            <input type="checkbox" id="toggle-whatsapp" disabled>
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="status-dot"></div>
      <span>Connected to Supabase</span>
      <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="main-content">
    <div id="view-container"></div>
  </main>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
